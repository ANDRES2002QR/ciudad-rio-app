name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.32.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Generate Android project files
        run: |
          flutter create --project-name ciudad_rio_app --platforms android .
          echo "android folder created"
          ls android/

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug - mas rapido y sin firma)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ciudad-rio-android
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
