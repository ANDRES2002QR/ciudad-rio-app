name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Create Flutter scaffold and merge source files
        run: |
          flutter create --project-name ciudad_rio_app --platforms android /tmp/app_scaffold
          cp -r /tmp/app_scaffold/android .
          cp -r /tmp/app_scaffold/test . 2>/dev/null || true
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ciudad-rio-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
